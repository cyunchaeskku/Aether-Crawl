<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Crawl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top Resource Bar ─────────────────────────────────────────── -->
  <header class="resource-bar">
    <div class="game-title">⚔ Aether Crawl</div>
    <div class="resources">
      <div class="resource resource-gold" id="res-gold">⚜ 0</div>
      <div class="resource resource-essence" id="res-essence">◈ 0</div>
    </div>
    <div class="resource resource-hp" id="res-hp">❤ 80/80</div>
    <div class="meta-stats" id="res-runs">Runs: 0 | Best: Floor 0</div>
    <button class="btn btn-small" id="lang-toggle-btn" onclick="window._ui.toggleLanguage()">한국어</button>
    <button class="btn btn-small" id="bgm-toggle-btn" onclick="window._ui.toggleBGM()">🎵 BGM</button>
    <button class="btn btn-small btn-reset" onclick="if(confirm('Reset all progress?')){localStorage.clear();location.reload()}">Reset</button>
  </header>

  <!-- ── Main Layout ──────────────────────────────────────────────── -->
  <main class="main-layout">

    <!-- Left: Hub Panel -->
    <aside class="hub-panel">

      <!-- Enter Dungeon -->
      <section class="hub-section">
        <button class="btn btn-danger btn-full" id="run-btn" onclick="window._ui.startRun()">
          Enter Dungeon
        </button>
      </section>

      <!-- Meta Upgrades -->
      <section class="hub-section">
        <h2 class="section-title" id="title-ascension">◈ Ascension</h2>
        <p class="section-hint" id="hint-ascension">Spend essence (earned from dungeon runs) on permanent upgrades.</p>
        <div id="meta-upgrades-list"></div>
      </section>

      <!-- Deck -->
      <section class="hub-section">
        <h2 class="section-title" id="title-deck">📖 Your Deck</h2>
        <div id="deck-list" class="deck-list"></div>
      </section>

      <!-- Encounter Catalog -->
      <section class="hub-section">
        <div class="section-header">
          <h2 class="section-title" id="title-catalog">🗂 Encounter Catalog</h2>
          <button class="btn btn-small" id="catalog-toggle-btn" onclick="window._ui.toggleCatalog()">View Catalog</button>
        </div>
        <p class="section-hint" id="hint-catalog">Cards discovered in the current run.</p>
        <div id="catalog-preview" class="catalog-preview"></div>
      </section>

      <!-- Relics -->
      <section class="hub-section" id="relics-section">
        <h2 class="section-title" id="title-relics">🏺 Relics</h2>
        <div id="relics-list"></div>
      </section>

    </aside>

    <!-- Right: Dungeon Panel -->
    <section class="dungeon-area">
      <div id="dungeon-panel"></div>
    </section>

  </main>

  <!-- Tooltip for relics/cards -->
  <div id="game-tooltip" class="game-tooltip"></div>

  <div id="catalog-overlay" class="catalog-overlay" onclick="window._ui.closeCatalogFromBackdrop(event)">
    <div class="catalog-modal">
      <div class="catalog-modal-header">
        <div class="catalog-modal-title" id="catalog-modal-title">Encounter Catalog</div>
        <button class="btn btn-small" id="catalog-fold-btn" onclick="window._ui.toggleCatalog()">Fold Catalog</button>
      </div>
      <div class="catalog-modal-content">
        <div id="catalog-modal-list" class="catalog-modal-list"></div>
        <div id="catalog-modal-detail" class="catalog-modal-detail"></div>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
